<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IS-TRAINING · 我的訓練系統</title>
<style>
  :root{
    --bg:#0e1116; --card:#171c24; --card2:#1f2630; --line:#2a323d;
    --txt:#e7edf3; --mut:#8a97a6; --acc:#19c37d; --warn:#f0a020; --bad:#ef5350; --good:#19c37d;
    --blue:#3b82f6;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"PingFang HK","Helvetica Neue",sans-serif;
    background:var(--bg);color:var(--txt);-webkit-tap-highlight-color:transparent}
  header{padding:18px 16px 8px;position:sticky;top:0;background:linear-gradient(var(--bg),rgba(14,17,22,.92));z-index:5}
  h1{font-size:18px;margin:0;letter-spacing:.5px}
  h1 span{color:var(--acc)}
  .sub{color:var(--mut);font-size:12px;margin-top:3px}
  nav{display:flex;gap:4px;overflow-x:auto;padding:8px 12px 0;position:sticky;top:0}
  nav button{flex:0 0 auto;background:none;border:none;color:var(--mut);font-size:14px;
    padding:8px 12px;border-radius:10px 10px 0 0;cursor:pointer;font-weight:600}
  nav button.active{color:var(--txt);background:var(--card)}
  main{padding:14px 14px 90px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px}
  .card h2{font-size:15px;margin:0 0 12px;display:flex;align-items:center;gap:8px}
  .muted{color:var(--mut);font-size:13px}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .pill{border-radius:999px;padding:4px 10px;font-size:12px;font-weight:700}
  .pill.go{background:rgba(25,195,125,.15);color:var(--good)}
  .pill.cut{background:rgba(240,160,32,.15);color:var(--warn)}
  .pill.rest{background:rgba(239,83,80,.15);color:var(--bad)}
  label{display:block;font-size:12px;color:var(--mut);margin:10px 0 4px}
  input,select,textarea{width:100%;background:var(--card2);border:1px solid var(--line);
    color:var(--txt);border-radius:10px;padding:10px;font-size:15px;font-family:inherit}
  textarea{min-height:64px;resize:vertical}
  button.act{background:var(--acc);color:#04150d;border:none;border-radius:10px;padding:12px 16px;
    font-size:15px;font-weight:700;cursor:pointer;width:100%}
  button.ghost{background:var(--card2);color:var(--txt);border:1px solid var(--line)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .metric{background:var(--card2);border-radius:12px;padding:12px;text-align:center}
  .metric .v{font-size:22px;font-weight:800}
  .metric .l{font-size:11px;color:var(--mut);margin-top:2px}
  .big{font-size:30px;font-weight:800;letter-spacing:.5px}
  .phase{border-left:3px solid var(--line);padding:4px 0 4px 12px;margin:8px 0}
  .phase.cur{border-color:var(--acc)}
  .phase b{font-size:14px}
  .ex{padding:8px 0;border-bottom:1px solid var(--line);font-size:14px}
  .ex:last-child{border:none}
  .tag{font-size:10px;padding:2px 6px;border-radius:6px;background:var(--card2);color:var(--warn);margin-left:6px}
  .coach{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}
  .coach:last-child{border:none}
  .coach .ico{font-size:22px}
  .coach .msg{font-size:14px;line-height:1.5}
  .coach .who{font-size:12px;color:var(--mut);font-weight:700;margin-bottom:2px}
  .logitem{font-size:13px;padding:8px 0;border-bottom:1px solid var(--line)}
  .spark{display:flex;align-items:flex-end;gap:3px;height:46px;margin-top:6px}
  .spark span{flex:1;background:var(--blue);border-radius:2px 2px 0 0;min-height:2px;opacity:.85}
  .hint{font-size:11px;color:var(--mut);margin-top:6px}
  .warnbox{background:rgba(240,160,32,.1);border:1px solid rgba(240,160,32,.3);border-radius:10px;padding:10px;font-size:13px;margin-top:8px}
  .hidden{display:none}
</style>
</head>
<body>
<header>
  <h1>IS·<span>TRAINING</span></h1>
  <div class="sub" id="subhead">個人訓練系統</div>
</header>
<nav id="nav"></nav>
<main id="main"></main>

<script>
// ============ 計劃資料 ============
// ⚠️ 公開 repo 只放呢個「中性殼」預設。你嘅個人計劃喺本地 data/plan.json（gitignored），
//    app 啟動時自動讀本地檔或你匯入嘅 plan.json 覆蓋呢個預設 —— 個人資料永不上 GitHub。
const DEFAULT_PLAN = {
  goal:"個人訓練系統",
  blocks:[], week:[], b1_d2:[], b1_d4:[], coachStatic:[],
  empty:true,
};
let PLAN = DEFAULT_PLAN;
async function loadPlan(){
  let p = load('is_plan', null);                         // 匯入過嘅本地計劃（localStorage）
  if(!p){ try{const r=await fetch('./data/plan.json'); if(r.ok){p=await r.json(); save('is_plan',p)}}catch(e){} }
  PLAN = p || DEFAULT_PLAN;
  PLAN.startDate = localStorage.getItem('is_start') || todayISO();
}

// ============ 知識庫（CPD / 概念 / 參考框架）============
let KB = {owner:{}, credentials:[], reference:[], concepts:[], insights_pool:[]};
async function loadKnowledge(){
  let k = load('is_kb', null);
  if(!k){ try{const r=await fetch('./data/knowledge.json'); if(r.ok){k=await r.json(); save('is_kb',k)}}catch(e){} }
  if(k) KB = Object.assign({owner:{},credentials:[],reference:[],concepts:[],insights_pool:[]}, k);
}
function saveKB(){ save('is_kb',KB); if(backendCfg().url){backendPost('put',{key:'knowledge',value:KB}).catch(()=>{})} }

// ============ 工具 ============
function todayISO(){return new Date().toISOString().slice(0,10)}
function load(k,d){try{return JSON.parse(localStorage.getItem(k))??d}catch(e){return d}}
function save(k,v){localStorage.setItem(k,JSON.stringify(v))}
function curWeek(){
  const d0=new Date(PLAN.startDate), now=new Date(todayISO());
  const wk=Math.floor((now-d0)/(7*864e5))+1;
  return Math.min(Math.max(wk,1),12);
}
function curBlock(){const w=curWeek();return w<=4?0:w<=8?1:w<=11?2:3}

// ============ Readiness 引擎（PLAN 第5節規則） ============
function readiness(g){
  // g: {hrv, hrv7, sleep, bb, hamstring} 缺值就忽略嗰條
  let status="go", reasons=[], rec=[];
  if(g.hamstring==="pain"){status="rest";reasons.push("有痛症");rec.push("跳過跑步/衝刺，只做復健 + 非患處")}
  if(g.bb!=null && g.bb<40){if(status!=="rest")status="cut";reasons.push("Body Battery 起床 <40");rec.push("總量減 30%")}
  if(g.sleep!=null && g.sleep<6){if(status!=="rest")status="cut";reasons.push("睡眠 <6 小時");rec.push("強度課改 Zone 2 恢復")}
  if(g.hrv!=null && g.hrv7!=null && g.hrv < g.hrv7*0.85){if(status!=="rest")status="cut";reasons.push("HRV 低於 7 日均值 15%+");rec.push("強度課改 Zone 2 恢復")}
  if(status==="go"){rec.push("照計劃進行")}
  return {status,reasons,rec};
}

// ============ Garmin 匯入 ============
async function tryFetchGarmin(){
  // app 同 garmin data 同 folder 時可自動讀；否則靠手動匯入
  try{const r=await fetch('./data/garmin_latest.json');if(r.ok){const j=await r.json();save('is_garmin',j);return j}}catch(e){}
  return load('is_garmin',null);
}
async function tryFetchDaily(){
  try{const r=await fetch('./data/daily_summary.csv');if(r.ok){const rows=parseGarminCSV(await r.text());save('is_daily',rows);return rows}}catch(e){}
  return load('is_daily',[]);
}

// ============ 雲端後端（Apps Script）============
function backendCfg(){return load('is_backend',{url:'',token:''})}
function setBackend(url,token){save('is_backend',{url:url.trim(),token:token.trim()})}
async function backendPost(action,payload){
  const c=backendCfg();if(!c.url)return {ok:false,error:'未設定後端'};
  const r=await fetch(c.url,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify(Object.assign({token:c.token,action},payload))});
  return r.json();
}
async function cloudPull(){
  const c=backendCfg();if(!c.url)return {ok:false,error:'未設定後端'};
  const r=await fetch(`${c.url}?token=${encodeURIComponent(c.token)}&action=pull&t=${Date.now()}`);
  const j=await r.json();
  if(j.ok){
    if(j.store){
      if(j.store.plan){save('is_plan',j.store.plan);PLAN=j.store.plan;PLAN.startDate=localStorage.getItem('is_start')||todayISO();}
      if(j.store.garmin_latest)save('is_garmin',j.store.garmin_latest);
      if(j.store.daily_summary)save('is_daily',j.store.daily_summary);
      if(j.store.knowledge){save('is_kb',j.store.knowledge);KB=Object.assign(KB,j.store.knowledge);}
    }
    if(j.sessions)save('is_sessions',j.sessions);
  }
  return j;
}
function parseGarminCSV(text){
  const lines=text.trim().split(/\r?\n/);const head=lines[0].split(',');
  return lines.slice(1).map(l=>{const c=l.split(',');const o={};head.forEach((h,i)=>o[h.trim()]=c[i]);return o});
}
function lastGood(rows){
  // 最近一日有實際數據（今日通常未 sync 完，會係空）
  for(let i=rows.length-1;i>=0;i--){const r=rows[i];if(r&&r.resting_hr&&r.resting_hr!=='')return r}
  return null;
}
function hrv7avg(rows){
  const v=rows.map(r=>parseFloat(r.hrv_overnight)).filter(x=>!isNaN(x)).slice(-7);
  return v.length?v.reduce((a,b)=>a+b,0)/v.length:null;
}

// ============ Views ============
const TABS=[["today","今日"],["plan","訓練"],["knowledge","知識"],["coachTools","教練"],["therapy","治療"],["faculty","導師團"],["clinic","研討室"],["log","打卡"],["data","數據"]];
let tab="today";
function render(){
  document.getElementById('subhead').textContent=PLAN.goal||'個人訓練系統';
  document.getElementById('nav').innerHTML=TABS.map(([k,n])=>
    `<button class="${k===tab?'active':''}" onclick="go('${k}')">${n}</button>`).join('');
  document.getElementById('main').innerHTML=VIEWS[tab]();
  if(tab==='today')initToday();
  if(tab==='data')initData();
}
function go(t){tab=t;render();window.scrollTo(0,0)}
function importPrompt(){
  return `<div class="card">
    <h2>📥 載入你的計劃</h2>
    <div class="muted">公開版唔含個人資料。匯入你本機嘅 <b>plan.json</b> 即可啟用全部功能（只存呢部裝置）。</div>
    <label>匯入 plan.json</label><input type="file" accept=".json" onchange="impPlan(this)">
    <div id="planMsg" style="margin-top:10px"></div>
  </div>`;
}
function impPlan(inp){const f=inp.files[0];if(!f)return;const rd=new FileReader();
  rd.onload=e=>{try{const p=JSON.parse(e.target.result);save('is_plan',p);PLAN=p;PLAN.startDate=localStorage.getItem('is_start')||todayISO();render();}
    catch(x){const m=document.getElementById('planMsg');if(m)m.innerHTML='<div class="pill rest">❌ 格式錯誤</div>'}};rd.readAsText(f)}

const VIEWS={
  today(){
    if(PLAN.empty) return importPrompt();
    const b=PLAN.blocks[curBlock()];
    return `
    <div class="card">
      <div class="muted">第 ${curWeek()} 週 · ${b.wk}</div>
      <div class="big">${b.name}</div>
      <div class="muted" style="margin-top:6px">${b.focus}</div>
    </div>
    <div class="card">
      <h2>🟢 今日 Readiness</h2>
      <div class="muted">由 Garmin 自動讀，或手動填。缺值會自動忽略。</div>
      <div class="grid2" style="margin-top:10px">
        <div><label>HRV（隔夜 ms）</label><input id="r_hrv" type="number" inputmode="decimal" placeholder="自動/手動"></div>
        <div><label>7日均 HRV</label><input id="r_hrv7" type="number" inputmode="decimal" placeholder="自動"></div>
        <div><label>睡眠（小時）</label><input id="r_sleep" type="number" inputmode="decimal" step="0.1"></div>
        <div><label>Body Battery 起床</label><input id="r_bb" type="number" inputmode="numeric"></div>
      </div>
      <label>傷患 / 痛症狀態</label>
      <select id="r_ham"><option value="ok">正常無痛</option><option value="tight">繃緊</option><option value="pain">有痛感</option></select>
      <div style="height:10px"></div>
      <button class="act" onclick="calcReady()">計算今日建議</button>
      <div id="readyOut" style="margin-top:12px"></div>
    </div>
    <div class="card">
      <h2>📋 今週模板</h2>
      ${PLAN.week.map(w=>`<div class="ex"><b>${w.d}</b> · ${w.loc}<br><span class="muted">${w.theme}</span><br><span class="hint">${w.role}</span></div>`).join('')}
    </div>
    <div class="card">
      <h2>🎓 今日一課</h2>
      <div class="msg" style="border-left:3px solid var(--acc);padding-left:10px">${dailyInsight()}</div>
      <div class="hint" style="margin-top:6px">想深入？去「導師團」傾。</div>
    </div>`;
  },
  plan(){
    if(PLAN.empty) return importPrompt();
    const cb=curBlock();
    return `
    <div class="card">
      <h2>🎯 ${PLAN.goal}</h2>
      <label>計劃開始日</label>
      <input type="date" id="startd" value="${PLAN.startDate}" onchange="setStart(this.value)">
      <div class="hint">第 ${curWeek()} 週 / 12 週</div>
    </div>
    <div class="card">
      <h2>📆 12 週分期</h2>
      ${PLAN.blocks.map((b,i)=>`<div class="phase ${i===cb?'cur':''}">
        <b>${b.wk} · ${b.name}</b>${i===cb?' <span class="pill go">進行中</span>':''}
        <div class="muted" style="margin-top:3px">${b.focus}</div>
        <div class="hint">跑步：${b.run} ｜ 力量：${b.str}</div></div>`).join('')}
    </div>
    <div class="card">
      <h2>🗓 每週模板</h2>
      ${PLAN.week.map(w=>`<div class="ex"><b>${w.d}</b> · ${w.loc} — ${w.theme}<br><span class="hint">${w.role}</span></div>`).join('')}
    </div>
    ${PLAN.blocks.map((b,i)=>`<div class="card">
      <h2>${i===cb?'▶ ':''}${b.wk} · ${b.name}${i===cb?' <span class="pill go" style="font-size:11px">本階段</span>':''}</h2>
      ${(b.sessions||[]).map(s=>`<div style="margin-bottom:10px">
        <div style="font-size:13px;font-weight:700;color:var(--acc);margin-bottom:4px">${s.title}</div>
        ${(s.items||[]).map(e=>`<div class="ex">${e.n}${e.t?`<span class="tag">⚠${e.t}</span>`:''}</div>`).join('')}
      </div>`).join('')}
    </div>`).join('')}
    <div class="card muted">完整 12 週計劃全文（連營養/防傷/數據）喺本機 <b>docs/PLAN.md</b>。</div>`;
  },
  log(){
    const logs=load('is_sessions',[]);
    return `
    <div class="card">
      <h2>✍️ 今日打卡</h2>
      <label>日期</label><input type="date" id="l_date" value="${todayISO()}">
      <label>課題</label>
      <select id="l_type">${(PLAN.week||[]).map(w=>`<option>${w.d} ${w.loc} · ${w.theme}</option>`).join('')}<option>跑步 Zone 2</option><option>跑步 質量/間歇</option><option>恢復/休息</option></select>
      <div class="grid2">
        <div><label>時長（分鐘）</label><input id="l_dur" type="number" inputmode="numeric"></div>
        <div><label>RPE（1–10）</label><input id="l_rpe" type="number" inputmode="numeric" min="1" max="10"></div>
      </div>
      <label>身體狀態</label>
      <select id="l_body"><option>都正常</option><option>部位繃緊</option><option>有痛感</option><option>頭痛</option><option>關節痛</option></select>
      <label>備註</label><textarea id="l_note" placeholder="今日感受、重量、配速…"></textarea>
      <div style="height:10px"></div>
      <button class="act" onclick="addLog()">儲存打卡</button>
    </div>
    <div class="card">
      <h2>📚 最近記錄（${logs.length}）</h2>
      ${logs.slice(-15).reverse().map(l=>`<div class="logitem"><b>${l.date}</b> · ${l.type}
        ${l.dur?` · ${l.dur}分`:''}${l.rpe?` · RPE ${l.rpe}`:''} · <span class="muted">${l.body}</span>
        ${l.note?`<br><span class="muted">${l.note}</span>`:''}</div>`).join('')||'<div class="muted">未有記錄</div>'}
    </div>`;
  },
  data(){
    return `
    <div class="card">
      <h2>⌚ Garmin 數據</h2>
      <div class="muted">先喺 terminal 跑 <b>garmin-sync</b>，再匯入 <b>garmin_latest.json</b> 同 <b>daily_summary.csv</b>。</div>
      <label>匯入 garmin_latest.json</label><input type="file" id="f_latest" accept=".json" onchange="impLatest(this)">
      <label>匯入 daily_summary.csv</label><input type="file" id="f_daily" accept=".csv" onchange="impDaily(this)">
      <div id="garminOut" style="margin-top:12px"></div>
    </div>
    <div class="card">
      <h2>📈 HRV 趨勢（近 14 日）</h2>
      <div id="hrvSpark"><div class="muted">未有數據</div></div>
    </div>
    <div class="card">
      <h2>😴 睡眠趨勢</h2>
      <div id="sleepSpark"><div class="muted">未有數據</div></div>
    </div>
    <div class="card">
      <h2>☁️ 雲端同步</h2>
      <div class="muted">設定後端後，計劃同 Garmin 數據自動由雲端同步 —— 唔使逐部機匯入。</div>
      <label>後端 /exec 網址</label><input id="b_url" placeholder="https://script.google.com/.../exec" value="${backendCfg().url}">
      <label>存取密碼 (ACCESS_TOKEN)</label><input id="b_token" placeholder="你設定嘅密碼" value="${backendCfg().token}">
      <div class="grid2" style="margin-top:10px">
        <button class="act ghost" onclick="saveBackend()">儲存設定</button>
        <button class="act" onclick="doPull()">由雲端拉取</button>
      </div>
      <div id="syncMsg" style="margin-top:10px"></div>
    </div>
    <div class="card">
      <h2>📋 計劃檔</h2>
      <div class="muted">重新匯入／更新本機 plan.json（覆蓋現有計劃，只存呢部裝置）。</div>
      <label>匯入 plan.json</label><input type="file" accept=".json" onchange="impPlan(this)">
      <div id="planMsg"></div>
    </div>`;
  },
  // ===== 知識庫 =====
  knowledge(){
    const done=KB.credentials.filter(c=>c.status==='done'), plan=KB.credentials.filter(c=>c.status!=='done');
    const byDomain=d=>KB.concepts.filter(c=>!d||c.domain===d);
    return `
    <div class="card">
      <h2>🎓 進修記錄 (CPD)</h2>
      <div class="muted" style="margin-bottom:6px">已完成 ${done.length} ｜ 計劃中 ${plan.length}</div>
      ${KB.credentials.map(c=>`<div class="ex">
        <b>${c.name}</b> <span class="pill ${c.status==='done'?'go':'cut'}" style="font-size:10px">${c.status==='done'?'已完成':('計劃'+(c.when?' '+c.when:''))}</span>
        <br><span class="hint">${c.provider} · ${c.domain} · ${c.key||''}</span></div>`).join('')||'<div class="muted">未有記錄</div>'}
    </div>
    <div class="card">
      <h2>🧠 概念卡（跨學科連結）</h2>
      <div class="muted">系統幫你把學過嘅嘢拆成概念、互相連結。撳「+」加你自己嘅筆記。</div>
      ${KB.concepts.map(c=>conceptCard(c)).join('')||'<div class="muted">未有概念卡</div>'}
      <div style="height:10px"></div>
      <button class="act ghost" onclick="toggleAddConcept()">＋ 加概念卡</button>
      <div id="addConcept" class="hidden" style="margin-top:10px">
        <label>標題</label><input id="kc_title">
        <label>學科</label><select id="kc_domain"><option>教練</option><option>治療師</option><option>運動員</option><option>跨學科</option><option>自身案例</option></select>
        <label>內容 / 筆記</label><textarea id="kc_body"></textarea>
        <label>標籤（逗號分隔）</label><input id="kc_tags" placeholder="例如：代償, 呼吸">
        <div style="height:8px"></div><button class="act" onclick="addConcept()">儲存概念卡</button>
      </div>
    </div>
    <div class="card">
      <h2>📖 參考框架</h2>
      ${KB.reference.map(r=>`<div class="ex"><b>${r.title}</b> <span class="hint">${r.domain}</span><br><span class="muted">${r.body}</span></div>`).join('')}
    </div>`;
  },
  // ===== 教練（PT 工具）=====
  coachTools(){
    const ref=KB.reference.filter(r=>/教練/.test(r.domain));
    return `
    <div class="card">
      <h2>🏋️ 教練工具</h2>
      <div class="muted">你嘅 PT 工作參考 —— 由你嘅進修框架整合（去「知識」加你自己嘅內容）。</div>
    </div>
    ${ref.length?ref.map(r=>`<div class="card"><h2>${r.title}</h2><div class="msg">${r.body}</div>
      <div class="hint">標籤：${(r.tags||[]).join('、')}</div></div>`).join(''):'<div class="card muted">未有教練類參考框架。喺「知識」加入或由雲端同步。</div>'}
    <div class="card muted">💡 想幫客戶出 program？去「導師團」揀「教練」身份，描述客戶情況，導師團會用你嘅框架幫你出。</div>`;
  },
  // ===== 治療（徒手/軟組織）=====
  therapy(){
    const ref=KB.reference.filter(r=>/治療/.test(r.domain));
    const selfCases=KB.concepts.filter(c=>c.domain==='自身案例'||(c.tags||[]).includes('自身案例'));
    return `
    <div class="card">
      <h2>🩹 治療工具</h2>
      <div class="muted">由你嘅徒手/軟組織治療進修框架整合（去「知識」加你自己嘅內容）。</div>
    </div>
    ${ref.length?ref.map(r=>`<div class="card"><h2>${r.title}</h2><div class="msg">${r.body}</div>
      <div class="hint">標籤：${(r.tags||[]).join('、')}</div></div>`).join(''):'<div class="card muted">未有治療類參考框架。喺「知識」加入或由雲端同步。</div>'}
    <div class="card">
      <h2>🔗 自身案例（學以致用）</h2>
      ${selfCases.map(c=>conceptCard(c)).join('')||'<div class="muted">未有自身案例</div>'}
    </div>`;
  },
  // ===== 個案研討室 =====
  clinic(){
    const cases=load('is_clinic',[]);
    return `
    <div class="card">
      <h2>🔬 個案研討室</h2>
      <div class="muted">貼一個個案（客戶 / 病人 / 學員 / 自己），相關部門專家會診，畀你結構化多角度分析。需設定後端 + CLAUDE_API_KEY。</div>
      <label>個案類型</label>
      <select id="cs_type"><option>客戶（訓練）</option><option>病人（治療）</option><option>學員（教學）</option><option>跳繩班個案</option><option>自己</option></select>
      <label>個案描述</label><textarea id="cs_desc" placeholder="例如：10歲跳繩班學員，連續單搖無問題但學唔到交叉，落地好重；或 42歲客戶久坐、深蹲膝內扣+腰痠…"></textarea>
      <div style="height:8px"></div><button class="act" onclick="consult()">召開會診</button>
      <div id="csOut" style="margin-top:12px"></div>
    </div>
    <div class="card">
      <h2>📁 過往會診（${cases.length}）</h2>
      ${cases.slice(-10).reverse().map(c=>`<div class="logitem"><b>${c.date} · ${c.type}</b><br><span class="muted">${c.desc}</span><br>${(c.reply||'').replace(/</g,'&lt;').replace(/\n/g,'<br>')}</div>`).join('')||'<div class="muted">未有會診記錄</div>'}
    </div>`;
  },
  // ===== 導師團（AI faculty）=====
  faculty(){
    if(PLAN.empty && !KB.credentials.length) return importPrompt();
    const g=load('is_garmin',null), daily=load('is_daily',[]);
    const lg=lastGood(daily)||{};
    const r=readiness({
      hrv: parseFloat(lg.hrv_overnight)||null, hrv7: hrv7avg(daily),
      sleep: parseFloat(lg.sleep_hours)||null, bb: parseFloat(lg.body_battery_high)||null,
      hamstring: load('is_lastham','ok'),
    });
    const team=[
      ["📊","數據分析師", r.status==="go"?"恢復數據良好，可照計劃推進。":"恢復數據偏低 — "+r.reasons.join("、")+"。建議：" + r.rec.join("、")+"。"],
      ["🏋️","S&C 教練（你導師）", curBlock()===0?"今階段力量維持 70–80%、submaximal。教學重點：用 OPT Phase1 角度睇自己 —— 穩定先於負荷。":"力量回升期，按 RPE 加，零痛為界。"],
      ...(PLAN.coachStatic||[]).map(c=>[c.ico,c.who,c.msg]),
    ];
    const role=load('is_role','全部');
    return `
    <div class="card">
      <h2>🎓 今日一課</h2>
      <div class="msg" style="border-left:3px solid var(--acc);padding-left:10px">${dailyInsight()}</div>
    </div>
    <div class="card">
      <h2>👥 導師團 · 今日簡報</h2>
      <div class="row" style="margin-bottom:8px">
        <span class="pill ${r.status==='go'?'go':r.status==='cut'?'cut':'rest'}">${r.status==='go'?'✅ 照計劃':r.status==='cut'?'⚠️ 降強度':'🛑 改恢復'}</span>
      </div>
      ${team.map(c=>`<div class="coach"><div class="ico">${c[0]}</div><div><div class="who">${c[1]}</div><div class="msg">${c[2]}</div></div></div>`).join('')}
    </div>
    ${(KB.faculty&&KB.faculty.length)?facultyRoster():''}
    <div class="card">
      <h2>💬 同導師團傾計</h2>
      <div class="muted">揀身份，導師團會用對應專業同你嘅進修背景嚟教 + 答（需設定後端 + CLAUDE_API_KEY）。</div>
      <label>以邊個身份問</label>
      <select id="chatRole" onchange="setRole(this.value)">
        ${["全部","運動員","教練","治療師"].map(x=>`<option ${x===role?'selected':''}>${x}</option>`).join('')}
      </select>
      <div id="chatLog" style="margin-top:10px">${renderChat()}</div>
      <textarea id="chatInput" placeholder="例如：點解我容易代償，點改善？或：幫我幫一個膝痛客戶出 program。"></textarea>
      <button class="act" onclick="sendChat()">發送</button>
    </div>`;
  },
};

// ============ 互動 ============
function setStart(v){localStorage.setItem('is_start',v);PLAN.startDate=v;render()}
function calcReady(){
  const g={
    hrv:val('r_hrv'), hrv7:val('r_hrv7'), sleep:val('r_sleep'), bb:val('r_bb'),
    hamstring:document.getElementById('r_ham').value
  };
  localStorage.setItem('is_lastham',JSON.stringify(g.hamstring));
  const r=readiness(g);
  const cls=r.status==='go'?'go':r.status==='cut'?'cut':'rest';
  const label=r.status==='go'?'✅ 照計劃進行':r.status==='cut'?'⚠️ 今日降強度':'🛑 今日改恢復';
  document.getElementById('readyOut').innerHTML=
    `<span class="pill ${cls}">${label}</span>
     ${r.reasons.length?`<div class="muted" style="margin-top:8px">原因：${r.reasons.join("、")}</div>`:''}
     <div style="margin-top:6px">建議：${r.rec.join("、")}</div>`;
}
function val(id){const v=document.getElementById(id).value;return v===''?null:parseFloat(v)}
async function addLog(){
  const logs=load('is_sessions',[]);
  const s={date:gv('l_date'),type:gv('l_type'),dur:gv('l_dur'),rpe:gv('l_rpe'),body:gv('l_body'),note:gv('l_note')};
  logs.push(s);save('is_sessions',logs);go('log');
  if(backendCfg().url){try{await backendPost('log',{session:s})}catch(e){}}  // 同步上雲
}
function renderChat(){
  const h=load('is_chat',[]);
  if(!h.length)return '<div class="muted" style="margin-bottom:8px">未有對話。問下教練團啦。</div>';
  return h.map(m=>`<div style="margin:8px 0"><span class="who" style="color:${m.role==='user'?'var(--blue)':'var(--acc)'}">${m.role==='user'?'你':'教練團'}</span><div class="msg">${(m.text||'').replace(/</g,'&lt;').replace(/\n/g,'<br>')}</div></div>`).join('');
}
function conceptCard(c){
  const titleOf=id=>{const ref=KB.reference.find(r=>r.id===id)||KB.concepts.find(x=>x.id===id);return ref?ref.title:id};
  const links=(c.links||[]).map(titleOf);
  return `<div class="ex"><b>${c.title}</b> <span class="hint">${c.domain}</span>
    <div class="msg">${c.body}</div>
    ${links.length?`<div class="hint">🔗 連結：${links.join('、')}</div>`:''}
    ${(c.tags||[]).length?`<div class="hint">標籤：${c.tags.join('、')}</div>`:''}</div>`;
}
function facultyMember(f){
  const line=(label,v)=>v?`<div class="hint">${label}：${v}</div>`:'';
  return `<div class="coach"><div class="ico">${f.ico}</div><div style="min-width:0">
    <div class="who">${f.name} <span class="hint">· ${f.base}</span></div>
    <div class="msg">${f.teach}</div>
    ${line('📐 代表理論',f.theories)}
    ${line('📚 權威來源',f.sources)}
    ${line('⚠️ 常見錯誤',f.pitfalls)}
    ${line('📛 關鍵爭議',f.debate)}
  </div></div>`;
}
function facultyRoster(){
  const depts=KB.departments&&KB.departments.length?KB.departments:[...new Set(KB.faculty.map(f=>f.dept).filter(Boolean))];
  const head=`<div class="card">
    <h2>🏛 你嘅專業團隊（${KB.faculty.length} 位 · ${depts.length} 部門）</h2>
    <div class="muted">每位對應你真實學過嘅學科，傾計時揀身份就會用對應專業教你。</div></div>`;
  if(!depts.length) return head + `<div class="card">${KB.faculty.map(facultyMember).join('')}</div>`;
  const groups=depts.map(d=>{
    const m=KB.faculty.filter(f=>f.dept===d);
    if(!m.length)return '';
    return `<div class="card"><h2 style="font-size:13px;color:var(--acc)">${d}（${m.length}）</h2>${m.map(facultyMember).join('')}</div>`;
  }).join('');
  const noDept=KB.faculty.filter(f=>!depts.includes(f.dept));
  return head + groups + (noDept.length?`<div class="card"><h2 style="font-size:13px;color:var(--acc)">其他</h2>${noDept.map(facultyMember).join('')}</div>`:'');
}
function toggleAddConcept(){const el=document.getElementById('addConcept');if(el)el.classList.toggle('hidden')}
function addConcept(){
  const t=gv('kc_title').trim();if(!t)return;
  KB.concepts.push({id:'u'+Date.now(),title:t,domain:gv('kc_domain'),body:gv('kc_body'),
    tags:gv('kc_tags').split(',').map(s=>s.trim()).filter(Boolean),links:[],source:'我'});
  saveKB();go('knowledge');
}
function dailyInsight(){
  const pool=KB.insights_pool||[];
  if(!pool.length)return '加咗進修記錄同概念卡，導師團就會每日教你一課。';
  const day=Math.floor((new Date(todayISO())-new Date('2026-01-01'))/864e5);
  return pool[((day%pool.length)+pool.length)%pool.length];
}
function setRole(v){save('is_role',v)}
function fullFacultyDigest(){return (KB.faculty||[]).map(f=>`${f.name}「${f.sources||f.base}」`).join('；')}
async function consult(){
  const type=gv('cs_type'), desc=gv('cs_desc').trim();
  if(!desc)return;
  const out=document.getElementById('csOut');if(out)out.innerHTML='<div class="muted">專家會診中…（多角度分析需時）</div>';
  const sys=`你係 IS 專業導師團嘅「個案研討室」主持。根據個案，召集相關部門專家會診，畀結構化多角度分析。`
    +`格式：①各相關專家觀點（標明專家身份，引用佢嘅權威來源/理論）②綜合建議（具體可行動）③風險 / 紅旗 / 需否轉介就醫 ④仲需要收集嘅資料。`
    +`用繁體中文（香港）、精簡專業、分點。可調用嘅專家及權威來源：${fullFacultyDigest()}。`
    +`個案主人嘅專業背景：${(KB.credentials||[]).filter(c=>c.status==='done').map(c=>c.name).join('、')}。個案類型：${type}。`;
  try{
    const j=await backendPost('chat',{messages:[{role:'user',content:'個案：'+desc}],system:sys});
    if(j.ok){const cases=load('is_clinic',[]);cases.push({date:todayISO(),type,desc,reply:j.reply});save('is_clinic',cases);go('clinic');}
    else if(out)out.innerHTML=`<div class="pill rest">❌ ${j.error||'失敗'}（檢查後端 + CLAUDE_API_KEY 設定）</div>`;
  }catch(e){if(out)out.innerHTML=`<div class="pill rest">❌ ${e.message}</div>`}
}
function facultyDigest(){
  const role=load('is_role','全部');
  const map={'運動員':['運動科學','表現訓練','營養與恢復','治療與復康'],'教練':['教練與教育','表現訓練','運動科學','業務與品牌'],'治療師':['治療與復康','運動科學']};
  const depts=map[role];
  const list=(KB.faculty||[]).filter(f=>!depts||depts.some(d=>(f.dept||'').includes(d)));
  return list.map(f=>`${f.name}「${f.sources||f.base}」`).join('；');
}
function chatContext(){
  const daily=load('is_daily',[]), lg=lastGood(daily)||{}, logs=load('is_sessions',[]).slice(-5);
  const r=readiness({hrv:parseFloat(lg.hrv_overnight)||null,hrv7:hrv7avg(daily),sleep:parseFloat(lg.sleep_hours)||null,bb:parseFloat(lg.body_battery_high)||null,hamstring:load('is_lastham','ok')});
  const b=PLAN.blocks[curBlock()]||{};
  const creds=(KB.credentials||[]).map(c=>c.name+(c.status==='done'?'(已完成)':'(計劃'+(c.when||'')+')')).join('、');
  const recent=(KB.concepts||[]).slice(-6).map(c=>c.title).join('、');
  return (PLAN.empty?'':`自身訓練目標：${PLAN.goal}。現處第 ${curWeek()} 週（${b.wk} ${b.name}：${b.focus||''}）。`)
    +(daily.length?`今日 readiness：${r.status}。最新：靜息心率 ${lg.resting_hr||'?'}、HRV ${lg.hrv_overnight||'?'}、睡 ${lg.sleep_hours||'?'}h。`:'')
    +(logs.length?`近期打卡：${logs.map(l=>l.date+' '+l.type+'('+(l.body||'')+')').join('；')}。`:'')
    +(creds?`我嘅專業進修：${creds}。`:'')
    +(recent?`近期概念卡：${recent}。`:'')
    +(KB.faculty&&KB.faculty.length?`可調用嘅專家及其權威來源（回答時引用對應專家同來源）：${facultyDigest()}。`:'')
    +(PLAN.bgContext?`身體背景（回答時顧及）：${PLAN.bgContext}`:'');
}
async function sendChat(){
  const inp=document.getElementById('chatInput');const text=inp.value.trim();if(!text)return;
  const h=load('is_chat',[]);h.push({role:'user',text});save('is_chat',h);
  inp.value='';document.getElementById('chatLog').innerHTML=renderChat()+'<div class="muted">教練團思考中…</div>';
  const msgs=h.map(m=>({role:m.role,content:m.text}));
  const role=load('is_role','全部');
  const sys=`你係一隊專業運動科學導師團（涵蓋運動表現/S&C、運動營養、徒手與軟組織治療、混合耐力體能）。`
    +`你嘅角色係用戶嘅「導師」：除咗答問題，仲要教佢「點解」、引用佢進修過嘅相關專業框架（見背景嘅進修記錄與概念卡），適時反問或考佢，幫佢鞏固專業知識。`
    +`當前身份焦點：${role}（運動員＝幫佢自己訓練；教練＝幫佢幫客戶出 program；治療師＝評估與手法）。`
    +`用繁體中文（香港）、精簡、可直接行動，必要時分點。背景：${chatContext()}`;
  try{
    const j=await backendPost('chat',{messages:msgs,system:sys});
    if(j.ok){h.push({role:'assistant',text:j.reply});save('is_chat',h);}
    else{h.push({role:'assistant',text:'⚠️ '+(j.error||'失敗')+'（檢查後端 + CLAUDE_API_KEY 設定）'});save('is_chat',h);}
  }catch(e){h.push({role:'assistant',text:'⚠️ '+e.message});save('is_chat',h);}
  document.getElementById('chatLog').innerHTML=renderChat();
}
function saveBackend(){
  setBackend(gv('b_url'),gv('b_token'));
  const m=document.getElementById('syncMsg');if(m)m.innerHTML='<div class="pill go">✅ 已儲存</div>';
}
async function doPull(){
  const m=document.getElementById('syncMsg');if(m)m.innerHTML='<div class="muted">拉取中…</div>';
  setBackend(gv('b_url'),gv('b_token'));
  try{const j=await cloudPull();
    if(j.ok){if(m)m.innerHTML='<div class="pill go">✅ 已由雲端同步</div>';render();go('today');}
    else if(m)m.innerHTML=`<div class="pill rest">❌ ${j.error||'失敗'}</div>`;
  }catch(e){if(m)m.innerHTML=`<div class="pill rest">❌ ${e.message}</div>`}
}
function gv(id){return document.getElementById(id).value}

async function initToday(){
  const g=await tryFetchGarmin();const daily=await tryFetchDaily();
  const lg=lastGood(daily);
  if(lg){
    if(lg.hrv_overnight)setIf('r_hrv',lg.hrv_overnight);
    if(lg.sleep_hours)setIf('r_sleep',lg.sleep_hours);
    if(lg.body_battery_high)setIf('r_bb',lg.body_battery_high);
  }
  const a=hrv7avg(daily);if(a)setIf('r_hrv7',a.toFixed(0));
}
function setIf(id,v){const el=document.getElementById(id);if(el&&!el.value)el.value=v}

function impLatest(inp){const f=inp.files[0];if(!f)return;const rd=new FileReader();
  rd.onload=e=>{try{save('is_garmin',JSON.parse(e.target.result));initData();flash('garminOut','✅ garmin_latest 已匯入')}catch(x){flash('garminOut','❌ 格式錯誤')}};rd.readAsText(f)}
function impDaily(inp){const f=inp.files[0];if(!f)return;const rd=new FileReader();
  rd.onload=e=>{save('is_daily',parseGarminCSV(e.target.result));initData();flash('garminOut','✅ daily_summary 已匯入')};rd.readAsText(f)}
function flash(id,m){const el=document.getElementById(id);if(el)el.innerHTML=`<div class="pill go">${m}</div>`}

async function initData(){
  const g=await tryFetchGarmin(), daily=await tryFetchDaily();
  const d=lastGood(daily)||{};
  if(g||daily.length){
    document.getElementById('garminOut').innerHTML=`<div class="grid2">
      <div class="metric"><div class="v">${d.resting_hr||'–'}</div><div class="l">靜息心率</div></div>
      <div class="metric"><div class="v">${d.hrv_overnight||'–'}</div><div class="l">HRV</div></div>
      <div class="metric"><div class="v">${d.sleep_hours||'–'}</div><div class="l">睡眠(h)</div></div>
      <div class="metric"><div class="v">${(g&&g.vo2max)||'–'}</div><div class="l">VO₂max</div></div></div>
      <div class="hint">最新數據：${d.date||'–'} ｜ 最後拉取：${(g&&g.pulled_at)||'–'}</div>`;
  }
  if(daily.length){
    spark('hrvSpark',daily.map(r=>parseFloat(r.hrv_overnight)).filter(x=>!isNaN(x)).slice(-14),'ms');
    spark('sleepSpark',daily.map(r=>parseFloat(r.sleep_hours)).filter(x=>!isNaN(x)).slice(-14),'h');
  }
}
function spark(id,arr,unit){const el=document.getElementById(id);if(!el)return;
  if(!arr.length){el.innerHTML='<div class="muted">未有數據</div>';return}
  const mx=Math.max(...arr),mn=Math.min(...arr);
  el.innerHTML=`<div class="spark">${arr.map(v=>`<span style="height:${10+(mx===mn?50:(v-mn)/(mx-mn)*80)}%" title="${v}${unit}"></span>`).join('')}</div>
    <div class="hint">最新 ${arr[arr.length-1]}${unit} ｜ 範圍 ${mn}–${mx}${unit}</div>`;
}

(async()=>{
  await loadPlan();
  await loadKnowledge();
  render();
  if(backendCfg().url){try{await cloudPull();render();}catch(e){}}  // 有設後端就自動由雲端同步
})();
</script>
